name: Deploy

on:
  push:
    branches: [main]

jobs:
  docker-build:
    name: Docker — build all images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: aitasker-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend # Added scope
          cache-to: type=gha,mode=max,scope=backend # Added scope

      - name: Build ai-service image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: false
          tags: aitasker-ai-service:${{ github.sha }}
          cache-from: type=gha,scope=ai-service # Added scope
          cache-to: type=gha,mode=max,scope=ai-service # Added scope

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: aitasker-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend # Added scope
          cache-to: type=gha,mode=max,scope=frontend # Added scope