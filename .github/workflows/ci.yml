name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # NestJS backend
  backend:
    name: Backend — build & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Lint
        run: npm run lint

      - name: Build (TypeScript compile)
        run: npm run build

      - name: Unit tests
        run: npm test -- --passWithNoTests

  # FastAPI ai-service 
  # ONLY UNIT TESTS IN CI
  # --------------------------
  # ai-service tests are split into two tiers by pytest marks:
  #
  #   Unit tests   (-m "not integration"):  117 tests, mock LLM, ~0.4s, FREE
  #   Integration  (-m integration):         14 tests, real Gemini API, ~90s, costs money
  #
  # CI runs unit tests only. Integration tests are skipped automatically when
  # ANTHROPIC_API_KEY starts with "test-" (settings.is_test_mode = True).
  #
  # The integration + quality gate is covered by the simulation suite, which is run manually before pushing:
  #   python simulations/runner.py all
  #
  # To run integration tests locally:
  #   pytest tests/ -m integration -v -s   (requires real key in ai-service/.env)
  ai-service:
    name: AI Service — unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Unit tests (mocked LLM, no API key needed)
        run: pytest tests/ -m "not integration" -v --tb=short
        env:
          ANTHROPIC_API_KEY: test-key-ci   # triggers is_test_mode=True, skips integration tests
          ENV: test

  # React frontend
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite + TypeScript)
        run: npm run build

  openwiki-update:
    name: OpenWiki — update docs
    runs-on: ubuntu-latest
    needs: [ai-service]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'push' &&
        github.ref == 'refs/heads/dev' &&
        !contains(github.event.head_commit.message, 'docs: update OpenWiki')
      )

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run OpenWiki update
        run: npm run openwiki:ci
        env:
          OPENWIKI_PROVIDER: openai-compatible
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: ${{ secrets.OPENAI_COMPATIBLE_BASE_URL }}
          OPENWIKI_MODEL_ID: ${{ secrets.OPENAI_COMPATIBLE_MODEL_ID }}

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            openwiki
            AGENTS.md
            CLAUDE.md
          branch: openwiki/update
          base: dev
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: "Automated OpenWiki documentation update."
