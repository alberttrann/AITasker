[pytest]
asyncio_mode = auto

# Use one event loop for the entire test session.
# This prevents the "Event loop is closed" error that occurs when the google-genai
# SDK's internal httpx client (bound to the first test's loop) is reused in a
# second test whose loop has already been created and replaced the first one.
# pytest-asyncio 0.24 changed the default from "session" to "function" — we
# restore "session" because all our async tests share singleton async resources.
asyncio_default_fixture_loop_scope = session

testpaths = tests
log_cli = true
log_cli_level = WARNING

markers =
    integration: real Gemini API calls — requires valid ANTHROPIC_API_KEY env var.
                 Run with: pytest -m integration
                 Skip with: pytest -m "not integration"  (default in CI)