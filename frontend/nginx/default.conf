# =============================================================================
# AITasker — nginx config for Railway deployment
#
# Simplified: serves the static React build only.
# API/WebSocket calls go directly from the browser to the Railway backend URL
# (baked into the bundle via VITE_API_BASE_URL at build time).
# No internal proxy needed — Railway handles HTTPS termination externally.
# =============================================================================

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite adds content hash to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}